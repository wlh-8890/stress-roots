const results = {

    color: "#8b7e5c"
  },
  body: {
    emoji: "🌊",
    label: "身心紧绷型",
    quote: "你的身体替你扛了太多。是时候让它知道，可以放松了。",
    insight: "<strong>根源：</strong>你的身体习惯了警觉模式——那些你没说出口的话、没放下的情绪，身体都替你记住了。身体在保护你，不是伤害你。",

// ─── State ───
let answers = {};
let currentQ = 0;

// ─── Build screens ───
const app = document.getElementById('app');

questions.forEach((q, i) => {
  const screen = document.createElement('div');
  screen.className = 'screen';
  screen.id = 'q' + i;

  let optsHTML = q.opts.map(o => `
    <div class="option" data-letter="${o.letter}" onclick="select(${i}, '${o.letter}', this)">
      <span class="letter">${o.letter}</span>
      <span>${o.text}</span>
    </div>
  `).join('');

  let dotsHTML = questions.map((_, d) => {
    let cls = d < i ? 'done' : (d === i ? 'current' : '');
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');

  screen.innerHTML = `
    <div class="question-header">
      <span class="question-num">第 ${i+1} / ${questions.length} 题</span>
      <span class="stage-tag">${q.stage}</span>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="options">${optsHTML}</div>
    <button class="btn-primary btn-next" id="btn${i}" onclick="next(${i})">${i < questions.length-1 ? '下一题 →' : '查看结果'}</button>
    <div class="hint-tap" id="hint${i}">👆 请先选择一个答案</div>
    <div class="progress-bar">${dotsHTML}</div>
  `;

  app.appendChild(screen);
});

// Result screen
const resultScreen = document.createElement('div');
resultScreen.className = 'screen result';
resultScreen.id = 'result';
app.appendChild(resultScreen);

// Footer
const footer = document.createElement('div');
footer.className = 'footer';
footer.textContent = '湖南润鼎文化 · 中国NLP中心';

// ─── Functions ───
function start() {
  answers = {};
  currentQ = 0;
  switchTo('q0');
}

function select(qIdx, letter, el) {
  answers[qIdx] = letter;
  const parent = el.parentElement;
  parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btn'+qIdx).classList.add('enabled');
  document.getElementById('hint'+qIdx).classList.add('hidden');
}

function next(qIdx) {
  if (answers[qIdx] === undefined) return;
  if (qIdx < questions.length - 1) {
    currentQ = qIdx + 1;
    switchTo('q'+currentQ);
  } else {
    showResult();
  }
}

function switchTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Scoring (v2.1 algorithm) ───
function calculateResult() {
  // Count types from Q3-Q10 (questions index 2-9), with special Q7 handling
  let countA = 0, countB = 0, countC = 0, countD = 0;
  let bodyScore = 0;

  // Q1, Q2: body detection only
  if (answers[0] === 'C') bodyScore++;
  if (answers[1] === 'C') bodyScore++;

  for (let i = 2; i < 10; i++) {
    const ans = answers[i];
    if (i === 6) {
      // Q7 (index 6): A → bodyScore, B→掌控, C→关系, D→成长
      if (ans === 'A') bodyScore++;
      else if (ans === 'B') countA++;
      else if (ans === 'C') countC++;
      else if (ans === 'D') countD++;
    } else {
      if (ans === 'A') countA++;
      else if (ans === 'B') countB++;
      else if (ans === 'C') countC++;
      else if (ans === 'D') countD++;
    }
  }

  // Determine type
  let resultKey;
  if (bodyScore >= 2) {
    resultKey = 'body';
  } else {
    // Find max
    const maxCount = Math.max(countA, countB, countC, countD);
    // Tiebreaker priority: C > A > B > D
    if (countC === maxCount) resultKey = 'relation';
    else if (countA === maxCount) resultKey = 'control';
    else if (countB === maxCount) resultKey = 'self';
    else resultKey = 'growth';
  }

  return resultKey;
}

// ─── Poster Generation ───
function generatePoster(key) {
  const r = results[key];
  const canvas = document.getElementById('posterCanvas');
  // Show canvas temporarily for rendering then download
  canvas.style.display = 'block';
  canvas.style.position = 'fixed';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.zIndex = '9999';
  canvas.style.width = '100vw';
  canvas.style.height = '100vh';
  canvas.style.background = '#faf8f5';

  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // Background
  ctx.fillStyle = '#faf8f5';
  ctx.fillRect(0, 0, W, H);

  // Top accent bar
  ctx.fillStyle = r.color;
  ctx.fillRect(0, 0, W, 6);

  // Emoji
  ctx.font = '64px serif';
  ctx.textAlign = 'center';
  ctx.fillText(r.emoji, W/2, 110);

  // Title
  ctx.fillStyle = '#2c2c2c';
  ctx.font = 'bold 28px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('我的压力根源', W/2, 170);

  // Type label
  ctx.fillStyle = r.color;
  ctx.font = 'bold 36px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText(r.label, W/2, 230);

  // Divider
  ctx.strokeStyle = '#e0dedb';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, 270);
  ctx.lineTo(W - 80, 270);
  ctx.stroke();

  // Quote (word wrap)
  ctx.fillStyle = '#4a4a4a';
  ctx.font = '18px "PingFang SC", "Microsoft YaHei", sans-serif';
  wrapText(ctx, r.quote, W/2, 320, W - 120, 30);

  // Insight (simplified)
  ctx.fillStyle = '#8a8a8a';
  ctx.font = '15px "PingFang SC", "Microsoft YaHei", sans-serif';
  const insightText = r.insight.replace(/<[^>]+>/g, '');
  wrapText(ctx, insightText, W/2, 400, W - 100, 24);

  // Powers
  ctx.fillStyle = r.color;
  ctx.font = 'bold 16px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('✨ ' + r.powers, W/2, 490);

  // Hook
  ctx.fillStyle = '#2c2c2c';
  ctx.font = 'bold 20px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('📩 ' + r.hookTitle, W/2, 550);

  ctx.fillStyle = '#8a8a8a';
  ctx.font = '15px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText(r.hookDesc, W/2, 580);

  // CTA
  ctx.fillStyle = '#456255';
  ctx.font = 'bold 18px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('你是哪种压力根源？扫码测一测', W/2, 650);

  // QR placeholder
  ctx.fillStyle = '#e0dedb';
  ctx.fillRect(W/2 - 60, 680, 120, 120);
  ctx.fillStyle = '#8a8a8a';
  ctx.font = '13px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('二维码区域', W/2, 745);

  // Footer
  ctx.fillStyle = '#c0bdb8';
  ctx.font = '11px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('本工具仅供自我觉察参考，不构成心理诊断或治疗建议', W/2, 850);

  // Trigger download
  setTimeout(() => {
    const link = document.createElement('a');
    link.download = '压力根源_' + r.label + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    // Hide canvas
    canvas.style.display = 'none';
  }, 300);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const chars = text.split('');
  let line = '';
  let currentY = y;
  for (let i = 0; i < chars.length; i++) {
    const testLine = line + chars[i];
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && i > 0) {
      ctx.fillText(line, x, currentY);
      line = chars[i];
      currentY += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, currentY);
}
